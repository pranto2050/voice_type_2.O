<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#0f0f1a"/>

  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="28" stroke="#00b4d8" stroke-width="1" stroke-opacity="0.3" fill="none"/>

  <!-- Mic body -->
  <rect x="24" y="12" width="16" height="26" rx="8" ry="8" fill="#00b4d8" fill-opacity="0.9"/>

  <!-- Mic stand arc -->
  <path d="M18 34c0 7.7 6.3 14 14 14s14-6.3 14-14" stroke="#00b4d8" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Mic pole -->
  <line x1="32" y1="48" x2="32" y2="54" stroke="#00b4d8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Base -->
  <line x1="24" y1="54" x2="40" y2="54" stroke="#00b4d8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Subtle highlight on mic body -->
  <rect x="27" y="15" width="4" height="10" rx="2" fill="white" fill-opacity="0.2"/>
</svg>
